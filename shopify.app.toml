client_id = "REPLACE_WITH_SHOPIFY_CLIENT_ID"
name = "CoffeeOS"
handle = "coffeeos"
application_url = "https://v0-chat-with-vercel-ai-two-self.vercel.app/app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-dev-store.myshopify.com"
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,read_orders"

[auth]
redirect_urls = [
  "https://v0-chat-with-vercel-ai-two-self.vercel.app/api/shopify/callback",
]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/shopify/webhooks/app-uninstalled"

