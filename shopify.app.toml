client_id = "REPLACE_WITH_SHOPIFY_CLIENT_ID"
name = "CoffeeOS"
handle = "coffeeos"
application_url = "https://coffeeos.io/app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-dev-store.myshopify.com"
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,read_orders,read_own_subscription"

[auth]
redirect_urls = [
  "https://coffeeos.io/api/shopify/callback",
]

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/api/shopify/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "https://coffeeos.io/api/shopify/webhooks/compliance"
