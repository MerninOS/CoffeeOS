# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8d9808c759838e785321922d75ae3dc6"
name = "CoffeeOS"
application_url = "https://coffeeos.io/app"
embedded = true
handle = "coffeos"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "your-dev-store.myshopify.com"

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://coffeeos.io/api/shopify/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  uri = "https://coffeeos.io/api/shopify/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_orders,read_products"

[auth]
redirect_urls = [ "https://coffeeos.io/api/shopify/callback" ]
